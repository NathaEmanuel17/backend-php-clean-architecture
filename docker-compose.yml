services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: backend_php_app
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - .:/var/www/html
    depends_on:
      - database
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: backend_php_nginx
    ports:
      - "${APP_PORT}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - backend

  database:
    image: postgres:16-alpine
    container_name: backend_php_database
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge